services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "3062:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://planning:planning@postgres:5432/planningaphp
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3062}
      - AUTH_TRUST_HOST=true
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - NEXT_PUBLIC_UMAMI_WEBSITE_ID=${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
      - NEXT_PUBLIC_UMAMI_URL=${NEXT_PUBLIC_UMAMI_URL:-https://analytics.silverliningcloud.fr/script.js}
      - NEXT_PUBLIC_GA4_ID=${NEXT_PUBLIC_GA4_ID:-}
      - TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY:-}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY:-}
      - UNSPLASH_ACCESS_KEY=${UNSPLASH_ACCESS_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Migration runner — runs once then exits
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    command: sh -c "npx prisma migrate deploy && npx tsx prisma/seed.ts"
    environment:
      - DATABASE_URL=postgresql://planning:planning@postgres:5432/planningaphp
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: planning
      POSTGRES_PASSWORD: planning
      POSTGRES_DB: planningaphp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planning -d planningaphp"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
